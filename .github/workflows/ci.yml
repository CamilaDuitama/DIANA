name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      # Note: tests/test_integration.sh is a separate manual end-to-end test that
      # requires the full model artifacts (~560 MB) and cannot run in standard CI.
      # Run it locally after install.sh: bash tests/test_integration.sh --verbose
      - name: Run tests
        run: pytest tests/ -v --tb=short
